<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Celebration</title>
    <link rel="stylesheet" href="manipulation.css">
</head>
<body>
    <h1 id="wish">Happy Birthday</h1>
    
    <!-- Balloons - Different Colors -->
    <div class="balloon balloon1">🔴</div>
    <div class="balloon balloon2">🔵</div>
    <div class="balloon balloon3">🟢</div>
    <div class="balloon balloon4">🟡</div>
    <div class="balloon balloon5">🟣</div>
    
    <div id="content">
        <img src="/Java-script/images/cake.jpeg" alt="Choco">
        <audio src="/Java-script/images/hbdsong.mp3" type="mp3"></audio>
        <p class="cake-text">
            This cake is for the person who is having birthday today 🎉
        </p>
        <p class="celebration-text">
            Wishing you an amazing day filled with joy and happiness! 🌟
        </p>
    </div>
    
    <script src="manipulation.js"></script>
</body>
</html>
