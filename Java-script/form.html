<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive form</title>
    </head>
<body>
    <h1>Driving License</h1>
    <form id="details">
        <label>Name:</label>
        <input type="text" id="name" required>
        <br><br>
        <label>Email:</label>
        <input type="email" id="mail" required>
        <br><br>
        <label>Phone no:</label>
        <input type="number" id="phone" required>
        <br><br>
        <label>D.O.B</label>
        <input type="date" id="dob"><br><br>
        <label>Age:</label>
        <input type="number" id="age" required>
        <br><br>
        <label>Gender:</label>
        <input type="radio"  name="gender" id="female" value="female">Female
        <input type="radio"  name="gender" id="male" value="male">Male
        <input type="radio"  name="gender" id="other" value="other">others
        <br><br>
        <label>verified:</label>
        <input type="checkbox" name="documents" value="RC book">RC
        <input type="checkbox" name="documents" value="Insurance">Insurance
        <input type="checkbox" name="documents" value="Polution">POlution control
        <br><br>
        <label>Address:</label>
        <input type="text" id="address" required>
        <br><br>
        <label>Photo</label>
        <input type="file" id="image" accept="image/*" required>
        <br><br>
        <button type="submit">Submit</button>
    
    </form>
    <div id="license-details">
        <img id="dp" src="image/*" alt="License photo">
        <div class="details">
            <p id="p1"></p>
            <p id="p2"></p>
            <p id="p3"></p>
            <p id="p4"></p>
            <p id="p5"></p>
            <p id="p6"></p>
            <p id="p7"></p>
            <p id="p8"></p>
        </div>
    </div>
    
<script src="Form.js" ></script>
</body>
</html>
