<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #chocolate{
            width: 1cm;
            height: 1cm;
            position:relative;
            background-color: lavender;
            border-style:double ;
            border-width: 20px;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div id="chocolate">
       
    </div>
    <p> Mouse over the space</p>
    <script>
        const box=document.getElementById("chocolate");
        let x=100;
        let y=100;
        const step=10;
        document.addEventListener("keydown",function(keys){
            if(keys.code=="ArrowDown"){
                y+=step;
            }
            if(keys.code=="ArrowUp"){
                y-=step;
            }
            if(keys.code=="ArrowRight"){
                x+=step;
            }
            if(keys.code=="ArrowLeft"){
                x-=step;
            }
            box.style.left=x+"px";
            box.style.top=y+"px";
        });
        const candy = document.getElementById("chocolate");
        candy.addEventListener("mouseover",function(){
            candy.style.backgroundColor="chocolate";
            candy.innerText="DairyMilk";
        });
        candy.addEventListener("mouseout",function(){
           
            candy.innerText="Melody";
            candy.style.fontSize="10px";
            candy.style.backgroundImage="url('/image/melody.jpeg')";
        });
    </script>
</body>
</html>
